# ---------------------------------------------------------------------------
# Media automation stack: Prowlarr -> Sonarr/Radarr -> a download client ->
# Jellyseerr for requests, Bazarr for subs, Jellyfin for playback.
#
# Two selectable download-client architectures, via DOWNLOAD_MODE in .env:
#   seedbox (default): everything downloads on a remote seedbox (qBittorrent +
#     Transmission there), synced back locally via rclone. See README section 9.
#   local: the qbittorrent service below does the actual downloading, no
#     seedbox needed -- gated behind the "local" Compose profile (activated by
#     setting COMPOSE_PROFILES=local in .env; scripts/setup.py does this for
#     you). No VPN by default and no ratio management -- see README's
#     local-mode section.
# DOWNLOAD_MODE only drives scripts/provision.py's API wiring; COMPOSE_PROFILES
# is the separate, Compose-native switch that actually starts/stops the local
# qbittorrent container. Keep them in sync -- provision.py checks this itself.
#
# movies/tv/downloads all live under ONE mounted parent (${MEDIA_ROOT}) rather
# than three separate volumes, on purpose: hardlink imports (copyUsingHardlinks
# in Sonarr/Radarr) can't cross a Docker bind-mount boundary, even when the
# separate mounts point at the same physical drive. Splitting them back into
# separate volumes silently breaks hardlinking again -- Sonarr/Radarr will
# fall back to full copies with no error, doubling disk usage per import. This
# applies to the local qbittorrent service below too, not just seedbox mode.
#
# Layout assumed on host (adjust MEDIA_ROOT/CONFIG_ROOT in .env if not):
#   ${MEDIA_ROOT}/movies
#   ${MEDIA_ROOT}/tv
#   ${MEDIA_ROOT}/downloads
#   ${CONFIG_ROOT}/<service>
# ---------------------------------------------------------------------------

services:

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}
    ports:
      - "8191:8191"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${MEDIA_ROOT}:/media
    ports:
      - "8989:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${MEDIA_ROOT}:/media
    ports:
      - "7878:7878"
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/bazarr:/config
      - ${MEDIA_ROOT}:/media
    ports:
      - "6767:6767"
    restart: unless-stopped

  # Local-mode only (see the header note above) -- inert/not started unless
  # COMPOSE_PROFILES includes "local". No VPN, no VPN-based port forwarding:
  # this is the zero-cost-of-entry path, not the private/hardened one. See
  # README's local-mode section for the required one-time first-run step
  # (qBittorrent ignores QBITTORRENT_USER/PASS env vars entirely -- it
  # generates a random temp password on first boot instead) and for how to
  # layer Gluetun (VPN) back on if you want it.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    profiles:
      - local
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_ROOT}/qbittorrent:/config
      - ${MEDIA_ROOT}:/media
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr
    init: true
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/jellyseerr:/app/config
    ports:
      - "5055:5055"
    depends_on:
      - sonarr
      - radarr
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN}
      - SEEDBOX_HOST=${SEEDBOX_HOST}
      - SEEDBOX_BASIC_AUTH=${SEEDBOX_BASIC_AUTH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - jellyseerr
    restart: unless-stopped