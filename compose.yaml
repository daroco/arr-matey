# ---------------------------------------------------------------------------
# Media automation stack: Prowlarr -> Sonarr/Radarr -> seedbox (qBittorrent +
# Transmission, remote) -> rclone sync -> Jellyseerr for requests, Bazarr for
# subs, Jellyfin for playback.
#
# All torrent downloading happens on the remote seedbox now (see README section
# 10) -- there is no local VPN'd download client in this stack anymore.
# TorrentLeech routes to the seedbox's qBittorrent (ratio/H&R compliance,
# DHT/PEX/LSD off); every other indexer routes to the seedbox's Transmission
# (DHT/PEX/LSD on, for public-tracker peer discovery). Finished files sync
# down locally via a scheduled rclone job for Sonarr/Radarr to import through
# Remote Path Mapping.
#
# Layout assumed on host (adjust MEDIA_ROOT/CONFIG_ROOT in .env if not):
#   ${DOWNLOADS_PATH}
#   ${MOVIES_PATH}
#   ${TV_PATH}
#   ${CONFIG_ROOT}/<service>
# ---------------------------------------------------------------------------

services:

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}
    ports:
      - "8191:8191"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${TV_PATH}:/tv
      - ${DOWNLOADS_PATH}:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${MOVIES_PATH}:/movies
      - ${DOWNLOADS_PATH}:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/bazarr:/config
      - ${MOVIES_PATH}:/movies
      - ${TV_PATH}:/tv
    ports:
      - "6767:6767"
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr
    init: true
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT}/jellyseerr:/app/config
    ports:
      - "5055:5055"
    depends_on:
      - sonarr
      - radarr
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
    environment:
      - SEEDBOX_BASIC_AUTH=${SEEDBOX_BASIC_AUTH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - jellyseerr
    restart: unless-stopped